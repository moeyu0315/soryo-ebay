<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1d4d3e">
<title>仕入れ判断リスト</title>
<style>
  :root{
    --bg:#ece4d0; --card:#fbf7ee; --line:#e3dcc8;
    --txt:#26302a; --sub:#6f6b59; --accent:#1a7a5e;
    --green:#15803d; --red:#dc2626;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:16px;line-height:1.5}
  header{background:linear-gradient(180deg,#1d4d3e,#163d31);color:#fff;padding:16px}
  header .hd{max-width:820px;margin:0 auto}
  header h1{font-size:18px;margin:0;font-weight:700}
  header .sub{font-size:12px;color:rgba(255,255,255,.8);margin-top:2px}
  .wrap{max-width:820px;margin:0 auto;padding:14px}
  .summary{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .summary .s{flex:1;min-width:100px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .summary .k{font-size:11px;color:var(--sub)}
  .summary .v{font-size:22px;font-weight:800;line-height:1.15}
  .pos{color:var(--green)} .neg{color:var(--red)}
  .litem{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px;background:var(--card)}
  .litem .lh{display:flex;align-items:center;margin-bottom:6px}
  .litem .lnm{flex:1;font-weight:800;font-size:16px}
  .litem .ldate{font-weight:500;color:var(--sub);font-size:11px;margin-left:8px}
  .litem .lprofit{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .litem .lprofit .lp{font-size:26px;font-weight:800}
  .litem .lprofit .lm{font-size:17px;font-weight:700}
  .litem .lflow{font-size:12px;color:var(--sub);background:var(--bg);border-radius:8px;padding:6px 9px;margin-bottom:8px}
  .litem .lg{display:flex;flex-wrap:wrap;gap:5px 16px;font-size:13px}
  .litem .lg b{color:var(--sub);font-weight:600;font-size:11px;margin-right:3px}
  .empty{color:var(--sub);text-align:center;padding:30px 0;line-height:1.8}
  .back{display:inline-block;margin:6px 0 24px;color:var(--accent);font-weight:700;text-decoration:none;font-size:14px}
</style>
</head>
<body>
<header><div class="hd">
  <h1>📋 仕入れ判断リスト</h1>
  <div class="sub" id="genDate"></div>
</div></header>
<div class="wrap">
  <div class="summary" id="summary"></div>
  <div id="listBody"></div>
  <a class="back" href="index.html">← 計算ツールに戻る</a>
</div>
<script>
const yen = n=> "¥"+Math.round(n||0).toLocaleString("ja-JP");
const esc = s=> String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtDate = ts=>{ try{ return new Date(ts).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } };
const LIST = (()=>{ try{ return JSON.parse(localStorage.getItem("ebayList_v1"))||[]; }catch(e){ return []; } })();

document.getElementById("genDate").textContent = "作成 "+new Date().toLocaleString("ja-JP",{year:"numeric",month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})+" ／ "+LIST.length+"件";

if(!LIST.length){
  document.getElementById("listBody").innerHTML = '<div class="empty">まだ項目がありません。<br>計算ツールで「📋 この内容を一覧に追加」を押すと、ここに表示されます。</div>';
}else{
  const total = LIST.reduce((a,e)=>a+(e.profit||0),0);
  const avg = LIST.reduce((a,e)=>a+(e.margin||0),0)/LIST.length;
  const win = LIST.filter(e=>e.profit>=0).length;
  document.getElementById("summary").innerHTML =
    `<div class="s"><div class="k">合計利益</div><div class="v ${total>=0?'pos':'neg'}">${yen(total)}</div></div>`
   +`<div class="s"><div class="k">平均利益率</div><div class="v ${avg>=0?'pos':'neg'}">${avg.toFixed(1)}%</div></div>`
   +`<div class="s"><div class="k">黒字 / 件数</div><div class="v">${win}/${LIST.length}</div></div>`;

  document.getElementById("listBody").innerHTML = LIST.map(e=>{
    const pos = e.profit>=0;
    const dt = e.ts ? `<span class="ldate">${fmtDate(e.ts)}</span>` : '';
    return `<div class="litem">
      <div class="lh"><div class="lnm">${e.name?esc(e.name):'(名称なし)'}${dt}</div></div>
      <div class="lprofit ${pos?'pos':'neg'}">
        <span class="lp">${yen(e.profit)}</span>
        <span class="lm">利益率 ${(e.margin||0).toFixed(1)}%</span>
      </div>
      <div class="lflow">売上 ${yen(e.salesYen)} − 手数料 ${yen(e.feeYen)} − 送料 ${yen(e.ship)} − 仕入 ¥${(e.cost||0).toLocaleString()}</div>
      <div class="lg">
        <span><b>売値</b>$${e.price$}</span>
        <span><b>重量</b>${(e.grams||0).toLocaleString()}g</span>
        <span><b>サイズ</b>${e.size}</span>
        <span><b>発送</b>${e.useLabel}（${e.basis}重量）</span>
      </div>
    </div>`;
  }).join("");
}
</script>
</body>
</html>
